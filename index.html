<!DOCTYPE html>
<!--
  Spielboard — ROOT redirect (spielboard.ai/ -> spielboard.ai/beta).

  There's no marketing homepage yet, so the site root simply forwards to the
  email-gated beta landing page at /beta. Three independent fallbacks so it works
  with or without JS and with or without redirects honored:
    1. <meta http-equiv="refresh"> — instant, no-JS redirect.
    2. <script> location.replace — JS fallback (replace() keeps history clean).
    3. A visible "Go to the beta ->" link — manual fallback if both are blocked.

  PUBLISHES TO: davidgidali/gencanvas-dist  ->  /index.html (repo root).
  The gated page is /beta/index.html (source: landing/index.html). See README.md.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="refresh" content="0; url=/beta" />
<link rel="canonical" href="/beta" />
<title>Spielboard — redirecting to the beta…</title>
<meta name="description" content="Spielboard — redirecting to the beta tester download." />
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
<style>
  :root { color-scheme: dark; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: #0b0b0e; color: #f4f4f7;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Helvetica, Arial, sans-serif;
    letter-spacing: -0.01em; -webkit-font-smoothing: antialiased; text-align: center;
  }
  .box { padding: 0 28px; }
  p { color: #a6a6b2; margin: 0 0 18px; }
  a {
    display: inline-block; color: #fff; text-decoration: none; font-weight: 600;
    background: linear-gradient(135deg, #6c5cff, #a06bff);
    padding: 11px 20px; border-radius: 12px;
  }
  a:hover { opacity: 0.92; }
</style>
</head>
<body>
  <div class="box">
    <p>Redirecting to the Spielboard beta…</p>
    <a href="/beta">Go to the beta →</a>
  </div>
  <script>
    // JS fallback (replace() so the redirect doesn't add a history entry).
    window.location.replace("/beta");
  </script>
</body>
</html>
